# BACKGROUND
background {
    monitor =
    path = ~/.config/backgrounds/backgrounds/dune.jpeg
    #blur_passes = 0
    #contrast = 0.8916
    #brightness = 0.8172
    #vibrancy = 0.1696
    #vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}


# Battery div
shape {
    monitor =
    size = 100, 60
    color = rgba(231, 92, 92, 1)
    rounding = 16
    rotate = 0
    # position = 40, 40
    position = 260, -50
    halign = left
    valign = top
    zindex = 1
}

# Battery
label {
    monitor =
    text = cmd[update:1000] echo -e "$($battery)"
    color = rgb(255, 255, 255)
    font_size = 16
    font_family = JetBrains Mono Nerd Font Mono
    # position = 60, 55
    position = 278, -65
    halign = left
    valign = top
    zindex = 5
}

# GREETINGS
label {
    monitor =
    text =Greetings
    color = rgba(205, 214, 224, .75)
    font_size = 45
    font_family = JetBrainsMono Nerd Font
    position = 165, 320
    halign = left
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(205, 214, 224, .75)
    font_size = 40
    font_family = JetBrainsMono Nerd Font
    position = 255, 240
    halign = left
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:3600000] echo "$(date '+%A, %B %d, %Y')"
    color = rgba(205, 214, 224, .75)
    font_size = 20
    text_align = left
    font_family = JetBrainsMono Nerd Font
    position = 170, 175
    halign = left
    valign = center
}

# Profie-Photo
image {
    monitor =
    path = /usr/share/pixmaps/faces/cat.jpg
    border_size = 1
    border_color = rgba(137, 180, 250, .75)
    size = 160
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 249, 25
    halign = left
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 320, 55
    color = rgba(255, 255, 255, .2)
    rounding = -1
    border_size = 0
    border_color = rgba(255, 255, 255, 1)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 170, -140
    halign = left
    valign = center
}

# USER
label {
    monitor =
    text =  $USER
    color = rgba(205, 214, 224, 0.80)
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 281, -140
    halign = left
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(205, 214, 244)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <i><span foreground="##ffffff99">Enter Password</span></i>
    hide_input = false
    position = 170, -220
    halign = left
    valign = center
}


